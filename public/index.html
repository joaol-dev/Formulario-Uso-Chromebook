<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Uso do Chromebook — Professor</title>
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>

  <div class="container">
    <header>
      <div class="logo-badge"><span class="dot"></span> E. M. Paulo Luiz Barroso Oliveira</div>
      <h1>Registro de uso<br><span>Chromebook</span></h1>
      <p class="subtitle" id="datetime"></p>
    </header>

    <div class="card">
      <div class="card-label"><span class="step">1</span> Professor</div>

      <select id="sel-professor">
        <option value="">Selecione o professor…</option>
      </select>

      <div id="campo-auxiliar" style="display:none; margin-top:0.75rem;">
        <input type="text" id="txt-auxiliar" placeholder="Digite o nome do Aux. de disciplina ou do TI" />
      </div>
    </div>

    <div class="card">
      <div class="card-label"><span class="step">2</span> Turma</div>
      <select id="sel-turma">
        <option value="">Selecione a turma…</option>
      </select>
    </div>

    <div class="card">
      <div class="card-label"><span class="step">3</span> Motivo do Uso</div>

      <div class="motivo-grid">
        <div class="motivo-option">
          <input type="radio" name="motivo" id="m-estudo" value="Estudo" />
          <label for="m-estudo"><span class="icon">📚</span> Estudo</label>
        </div>

        <div class="motivo-option">
          <input type="radio" name="motivo" id="m-recreativo" value="Recreativo" />
          <label for="m-recreativo"><span class="icon">🎮</span> Recreativo</label>
        </div>

        <div class="motivo-option">
          <input type="radio" name="motivo" id="m-outros" value="Outros" />
          <label for="m-outros"><span class="icon">✏️</span> Outros</label>
        </div>
      </div>

      <div id="outros-texto">
        <textarea id="txt-outros" placeholder="Descreva o motivo…"></textarea>
      </div>
    </div>

    <button class="btn-confirm" id="btn-confirmar" disabled>
      ✓ Confirmar Uso
    </button>

    <footer>
      Técnico de TI? <a href="ti.html">Acesse o painel →</a>
    </footer>
  </div>

  <div id="success-overlay">
    <div class="success-icon">✅</div>
    <div class="success-title">Uso registrado!</div>
    <div class="success-detail" id="success-detail"></div>
    <button class="btn-novo" id="btn-novo-registro">Novo registro</button>
  </div>

  <script src="js/script.js"></script>
</body>

</html>
