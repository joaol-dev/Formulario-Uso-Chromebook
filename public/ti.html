<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel TI — Chromebook</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/ti.css" />
</head>

<body>
  <div class="container">
    <header>
      <div class="header-left">
        <div class="badge">🖥️ Painel do Técnico de TI</div>
        <h1>Histórico de uso<br><span>Chromebook</span></h1>
      </div>
      <div class="header-right">
        <a href="index.html" class="btn">← Tela de Registro</a>
        <button class="btn primary" id="export-btn" type="button">⬇ Exportar CSV</button>
        <button class="btn danger" id="clear-btn" type="button">🗑 Limpar Tudo</button>
      </div>
    </header>

    <div class="stats" id="stats"></div>

    <div class="filters">
      <input type="text" id="f-professor" placeholder="🔍 Filtrar por professor…" />
      <select id="f-turma">
        <option value="">Todas as turmas</option>
        <option>Turma 600</option>
        <option>Turma 601</option>
        <option>Turma 700</option>
        <option>Turma 701</option>
        <option>Turma 800</option>
        <option>Turma 801</option>
        <option>Turma 900</option>
        <option>Turma 901</option>
      </select>
      <select id="f-motivo">
        <option value="">Todos os motivos</option>
        <option value="Estudo">Estudo</option>
        <option value="Recreativo">Recreativo</option>
        <option value="Outros">Outros</option>
      </select>
      <select id="f-data">
        <option value="">Todas as datas</option>
      </select>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Professor</th>
            <th>Turma</th>
            <th>Motivo</th>
            <th>Data</th>
            <th>Hora</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
      <div class="empty" id="empty-state" hidden>
        <div class="empty-icon">📋</div>
        <p>Nenhum registro encontrado.</p>
      </div>
    </div>

    <div class="pagination" id="pagination"></div>
  </div>

  <script src="js/ti.js"></script>
</body>

</html>
