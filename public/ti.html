<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Painel TI — Chromebook</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/ti.css?v=2" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon.png">
</head>

<body>
  <div class="container">
    <header>
      <div class="header-left">
        <div class="badge">
          <i data-lucide="shield-check"></i>
          <span>Painel do Técnico de TI</span>
        </div>
        <h1>Histórico de uso<br><span>Chromebook</span></h1>
      </div>
      <div class="header-right">
        <a href="index.html" class="btn">
          <i data-lucide="arrow-left"></i>
          <span>Tela de Registro</span>
        </a>
        <button class="btn primary" onclick="exportXLSX()">
          <i data-lucide="download"></i>
          <span>Exportar XLSX</span>
        </button>
        <button class="btn danger" onclick="confirmClear()">
          <i data-lucide="x"></i>
          <span>Limpar Tudo</span>
        </button>
        <button class="btn" onclick="logout()">
          <i data-lucide="log-out"></i>
          <span>Sair</span>
        </button>
      </div>
    </header>

    <div class="stats" id="stats"></div>

    <div class="filters">
      <div class="search-box">
        <i data-lucide="search" class="search-icon"></i>
        <input type="text" id="f-professor" placeholder="Buscar professor..." oninput="render()">
      </div>

      <select id="f-turma" onchange="render()">
        <option value="">Todas as turmas</option>
        <option>Turma 600</option>
        <option>Turma 601</option>
        <option>Turma 700</option>
        <option>Turma 701</option>
        <option>Turma 800</option>
        <option>Turma 801</option>
        <option>Turma 900</option>
        <option>Turma 901</option>
      </select>

      <select id="f-motivo" onchange="render()">
        <option value="">Todos os motivos</option>
        <option value="Estudo">Estudo</option>
        <option value="Recreativo">Recreativo</option>
        <option value="Outros">Outros</option>
      </select>

      <select id="f-data" onchange="render()">
        <option value="">Todas as datas</option>
      </select>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Professor</th>
            <th>Turma</th>
            <th>Motivo</th>
            <th>Data</th>
            <th>Hora</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>

      <div class="empty" id="empty-state" style="display:none">
        <div class="empty-icon">
          <i data-lucide="clipboard-list"></i>
        </div>
        <p>Nenhum registro encontrado.</p>
      </div>
    </div>

    <div class="pagination" id="pagination"></div>
  </div>

  <script src="js/ti.js?v=3"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();
  </script>
</body>

</html>
